<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行精算アプリ</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --surface3: #e8e5e0;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9b9b96;
    --accent: #1a1a18;
    --danger-bg: #fff0ee;
    --danger-border: rgba(200,60,30,0.25);
    --danger-text: #b83020;
    --success-bg: #edf6e8;
    --success-border: rgba(40,140,60,0.25);
    --success-text: #217a38;
    --info-bg: #eaf0fb;
    --info-border: rgba(30,80,180,0.2);
    --info-text: #1a4db5;
    --warn-bg: #fdf3e3;
    --warn-border: rgba(180,120,0,0.25);
    --warn-text: #8a5a00;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #262624;
      --surface2: #2e2e2b;
      --surface3: #363633;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --text: #ebebdf;
      --text-muted: #9b9b94;
      --text-hint: #6b6b64;
      --accent: #ebebdf;
      --danger-bg: #2a1a18;
      --danger-border: rgba(200,80,60,0.3);
      --danger-text: #f07060;
      --success-bg: #172217;
      --success-border: rgba(60,160,80,0.3);
      --success-text: #60c070;
      --info-bg: #161e30;
      --info-border: rgba(80,130,230,0.3);
      --info-text: #7aabf0;
      --warn-bg: #231e10;
      --warn-border: rgba(200,160,40,0.3);
      --warn-text: #d4a830;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  input[type=date] {
    height: 36px; padding: 0 10px; font-size: 14px; font-family: inherit;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); flex: 1; outline: none; transition: border-color 0.15s;
  }
  input[type=date]:focus { border-color: var(--accent); }
  input[type=text], input[type=number], select {
    height: 36px; padding: 0 10px; font-size: 14px; font-family: inherit;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); flex: 1; outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .btn {
    height: 36px; padding: 0 14px; font-size: 13px; font-family: inherit;
    cursor: pointer; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text); white-space: nowrap; transition: background 0.12s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: var(--surface); border-color: var(--accent); font-weight: 500; }
  .btn-primary:hover { opacity: 0.82; background: var(--accent); }
  .btn-sm { height: 26px; padding: 0 10px; font-size: 12px; }
  .btn-danger { color: var(--danger-text); border-color: var(--danger-border); }
  .btn-block { width: 100%; margin-top: 10px; }

  .toggle { display: flex; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; }
  .toggle button { flex: 1; height: 36px; padding: 0 10px; font-size: 13px; font-family: inherit; border: none; background: transparent; cursor: pointer; color: var(--text-muted); transition: background 0.12s, color 0.12s; white-space: nowrap; }
  .toggle button.active { background: var(--accent); color: var(--surface); }

  /* Family groups */
  .family-block {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .family-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface3);
    border-bottom: 0.5px solid var(--border);
  }
  .family-name { font-size: 14px; font-weight: 600; }
  .family-members { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .member-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; border: 0.5px solid var(--border);
  }
  .member-tag.adult { background: var(--info-bg); border-color: var(--info-border); color: var(--info-text); }
  .member-tag.teen { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-text); }
  .member-tag.child { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
  .member-tag button { background: none; border: none; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; padding: 0; opacity: 0.7; }

  .check-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--border);
    font-size: 12px; font-family: inherit; cursor: pointer;
    background: var(--surface2); color: var(--text-muted);
    margin: 3px; transition: all 0.12s; user-select: none;
  }
  .check-chip.selected { background: var(--info-bg); border-color: var(--info-border); color: var(--info-text); }
  .check-chip .cat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-adult { background: var(--info-text); }
  .dot-teen { background: var(--warn-text); }
  .dot-child { background: var(--success-text); }

  .expense-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
  .expense-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .expense-desc { font-size: 14px; font-weight: 500; }
  .expense-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-size: 16px; font-weight: 600; }

  .settle-card { border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .settle-card.pay { background: var(--danger-bg); border: 0.5px solid var(--danger-border); }
  .settle-pay-amount { font-size: 15px; font-weight: 600; color: var(--danger-text); }
  .settle-label { font-size: 13px; line-height: 1.6; }
  .settle-label .name { font-weight: 600; }
  .settle-arrow { color: var(--text-muted); margin: 0 4px; }

  .ratio-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .ratio-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }

  .section-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .empty { text-align: center; padding: 1.5rem; color: var(--text-hint); font-size: 13px; }
  .rate-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .rate-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .max-w { max-width: 560px; margin: 0 auto; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
  .add-member-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .toggle button { padding: 0 6px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="max-w">
  <h1>旅行精算</h1>
  <p class="subtitle">家族単位で支払いを記録・最小送金で精算　<span id="sync-status" style="font-size:12px">読み込み中...</span></p>

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">設定</div>
    <div class="rate-row">
      <span class="rate-label">1 USD =</span>
      <input type="number" id="rate" value="160" min="1" style="max-width:90px" oninput="render()">
      <span class="rate-label">円　　表示：</span>
      <div class="toggle">
        <button id="btn-jpy" class="active" onclick="setCurrency('JPY')">¥ 円</button>
        <button id="btn-usd" onclick="setCurrency('USD')">$ USD</button>
        <button id="btn-both" onclick="setCurrency('BOTH')">両方</button>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
      <div class="ratio-legend">
        <span class="ratio-item"><span class="cat-dot dot-adult" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--info-text)"></span>大人 ×10</span>
        <span class="ratio-item"><span class="cat-dot dot-teen" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--warn-text)"></span>中高ノンアル ×7</span>
        <span class="ratio-item"><span class="cat-dot dot-child" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--success-text)"></span>こども ×5</span>
      </div>
      <button class="btn btn-sm btn-danger" onclick="resetData()" style="white-space:nowrap">データ全消去</button>
    </div>
  </div>

  <!-- 家族・メンバー登録 -->
  <div class="card">
    <div class="card-title">家族・メンバー</div>

    <div class="row">
      <input type="text" id="family-input" placeholder="家族名（例：田中家）" onkeydown="if(event.key==='Enter')addFamily()">
      <button class="btn" onclick="addFamily()">家族追加</button>
    </div>

    <div id="families-wrap"></div>

    <div class="divider"></div>
    <div class="section-label">家族にメンバーを追加</div>
    <div class="add-member-row">
      <select id="member-family" style="flex:1;min-width:100px"></select>
      <input type="text" id="member-name" placeholder="名前" style="flex:1;min-width:80px" onkeydown="if(event.key==='Enter')addMember()">
      <div class="toggle" style="flex:0 0 auto">
        <button id="btn-cat-adult" class="active" onclick="setMemberCat('adult')">大人</button>
        <button id="btn-cat-teen" onclick="setMemberCat('teen')">中高</button>
        <button id="btn-cat-child" onclick="setMemberCat('child')">子</button>
      </div>
      <button class="btn" onclick="addMember()">追加</button>
    </div>
  </div>

  <!-- 支払い追加 -->
  <div class="card">
    <div class="card-title">支払いを追加</div>
    <div class="row">
      <input type="date" id="exp-date">
      <input type="text" id="exp-desc" placeholder="内容（例：ディナー）">
    </div>
    <div class="row">
      <input type="number" id="exp-amount" placeholder="金額" min="0">
      <div class="toggle" style="flex:0 0 auto">
        <button id="btn-in-usd" class="active" onclick="setInputCur('USD')">USD</button>
        <button id="btn-in-jpy" onclick="setInputCur('JPY')">JPY</button>
      </div>
    </div>
    <div style="margin-bottom:8px">
      <div class="section-label">支払った人</div>
      <select id="exp-payer"></select>
    </div>
    <div>
      <div class="section-label">参加者（比率按分）</div>
      <div id="participants-check"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addExpense()">追加する</button>
  </div>

  <!-- 支払い一覧 -->
  <div class="card">
    <div class="card-title">支払い一覧</div>
    <div id="expenses-list"><div class="empty">まだ支払いがありません</div></div>
  </div>

  <!-- 精算結果 -->
  <div class="card">
    <div class="card-title">精算結果（家族単位）</div>
    <div class="summary-grid" id="summary-grid"></div>
    <div id="result-list"><div class="empty">家族・メンバーと支払いを入力してください</div></div>
  </div>
</div>

<script>
// ---------- state ----------
const RATIOS = { adult: 10, teen: 7, child: 5 };
const CAT_LABEL = { adult: '大人', teen: '中高ノンアル', child: 'こども' };

let families = [];   // [{id, name, members:[{id,name,cat}]}]
let expenses = [];   // [{desc,amountJPY,payerMemberId,participants:[memberId,...]}]
let displayCur = 'JPY';
let inputCur = 'USD';
let memberCat = 'adult';
let nextId = 1;

function uid() { return nextId++; }

// ---------- GAS sync ----------
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyYw087-3W0ErVxBokHdJvNsezyXJSunBaT0Yon5Ojz1M_pFra1u3pbG6jU2gxyvyMo/exec';
const STORAGE_KEY = 'travel_expense_v1';
let syncTimer = null;
let isSyncing = false;

function setStatus(msg, isError) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--danger-text)' : 'var(--text-muted)';
}

async function saveData() {
  // localStorageにも保存（オフライン時のフォールバック）
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ families, expenses, displayCur, nextId }));
  } catch(e) {}

  // GASへの保存はdebounce（連続操作時に負荷をかけない）
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    setStatus('保存中...');
    try {
      const payload = JSON.stringify({ families, expenses, displayCur, nextId });
      await fetch(GAS_URL + '?action=save&payload=' + encodeURIComponent(payload));
      setStatus('保存済み ✓');
    } catch(e) {
      setStatus('オフライン（ローカル保存済み）', true);
    }
  }, 800);
}

async function loadData() {
  // まずlocalStorageから即時表示
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      families = d.families || [];
      expenses = d.expenses || [];
      displayCur = d.displayCur || 'JPY';
      nextId = d.nextId || 1;
      render();
    }
  } catch(e) {}

  // 次にGASから最新データを取得
  setStatus('同期中...');
  try {
    const res = await fetch(GAS_URL + '?action=load');
    const json = await res.json();
    if (json.ok && json.data) {
      const d = JSON.parse(json.data);
      families = d.families || [];
      expenses = d.expenses || [];
      displayCur = d.displayCur || 'JPY';
      nextId = d.nextId || 1;
      localStorage.setItem(STORAGE_KEY, json.data);
      render();
      setStatus('同期完了 ✓');
    } else {
      setStatus('新規データ');
    }
  } catch(e) {
    setStatus('オフライン（ローカルデータを表示中）', true);
  }
}

async function resetData() {
  if (!confirm('すべてのデータをリセットしますか？この操作は元に戻せません。')) return;
  families = []; expenses = []; displayCur = 'JPY'; nextId = 1;
  localStorage.removeItem(STORAGE_KEY);
  try {
    await fetch(GAS_URL + '?action=save&payload=' + encodeURIComponent(JSON.stringify({ families, expenses, displayCur, nextId })));
  } catch(e) {}
  render();
}

// 30秒ごとに自動で最新データを取得（他の人が入力した内容を反映）
setInterval(async () => {
  if (isSyncing) return;
  isSyncing = true;
  try {
    const res = await fetch(GAS_URL + '?action=load');
    const json = await res.json();
    if (json.ok && json.data) {
      const d = JSON.parse(json.data);
      // nextIdが増えていたら他の人が更新している
      if (d.nextId > nextId) {
        families = d.families || [];
        expenses = d.expenses || [];
        displayCur = d.displayCur || 'JPY';
        nextId = d.nextId || 1;
        localStorage.setItem(STORAGE_KEY, json.data);
        render();
        setStatus('他のメンバーが更新しました ✓');
      }
    }
  } catch(e) {}
  isSyncing = false;
}, 30000);
function getRate() { return parseFloat(document.getElementById('rate').value) || 160; }
function toJPY(amount, cur) { return cur === 'USD' ? amount * getRate() : amount; }
function fmt(amountJPY) {
  const r = getRate();
  const jpy = '¥' + Math.round(amountJPY).toLocaleString();
  const usd = '$' + (amountJPY / r).toFixed(2);
  if (displayCur === 'JPY') return jpy;
  if (displayCur === 'USD') return usd;
  return jpy + ' / ' + usd;
}

function allMembers() {
  return families.flatMap(f => f.members.map(m => ({ ...m, familyId: f.id, familyName: f.name })));
}
function getMember(id) { return allMembers().find(m => m.id === id); }
function getFamily(id) { return families.find(f => f.id === id); }

// ---------- actions ----------
function setCurrency(c) {
  displayCur = c;
  ['jpy','usd','both'].forEach(x => document.getElementById('btn-' + x).classList.remove('active'));
  document.getElementById('btn-' + c.toLowerCase()).classList.add('active');
  render();
}
function setInputCur(c) {
  inputCur = c;
  document.getElementById('btn-in-usd').classList.toggle('active', c === 'USD');
  document.getElementById('btn-in-jpy').classList.toggle('active', c === 'JPY');
}
function setMemberCat(c) {
  memberCat = c;
  ['adult','teen','child'].forEach(x => document.getElementById('btn-cat-' + x).classList.remove('active'));
  document.getElementById('btn-cat-' + c).classList.add('active');
}

function addFamily() {
  const inp = document.getElementById('family-input');
  const name = inp.value.trim();
  if (!name) return;
  if (families.find(f => f.name === name)) { alert('同じ名前の家族が既にあります'); return; }
  families.push({ id: uid(), name, members: [] });
  inp.value = '';
  render();
}
function removeFamily(id) {
  families = families.filter(f => f.id !== id);
  expenses = expenses.filter(e => {
    const payer = getMember(e.payerMemberId);
    return payer; // remove expenses whose payer no longer exists... 
  });
  render();
}

function addMember() {
  const familyId = parseInt(document.getElementById('member-family').value);
  const name = document.getElementById('member-name').value.trim();
  if (!name || !familyId) return;
  const family = getFamily(familyId);
  if (!family) return;
  family.members.push({ id: uid(), name, cat: memberCat });
  document.getElementById('member-name').value = '';
  render();
}
function removeMember(memberId) {
  families.forEach(f => { f.members = f.members.filter(m => m.id !== memberId); });
  render();
}

function addExpense() {
  const date = document.getElementById('exp-date').value;
  const desc = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const payerMemberId = parseInt(document.getElementById('exp-payer').value);
  const chips = [...document.querySelectorAll('.check-chip.selected')];
  const participants = chips.map(c => parseInt(c.dataset.mid));
  if (!desc || !amount || !payerMemberId || participants.length === 0) {
    alert('すべての項目を入力してください'); return;
  }
  const amountJPY = toJPY(amount, inputCur);
  expenses.push({ id: uid(), date, desc, amountJPY, payerMemberId, participants });
  document.getElementById('exp-date').value = '';
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  render();
}
function removeExpense(id) { expenses = expenses.filter(e => e.id !== id); render(); }

// ---------- calculation ----------
function calcBalances() {
  // balances per family
  const familyBal = {};
  families.forEach(f => { familyBal[f.id] = 0; });

  expenses.forEach(e => {
    const payer = getMember(e.payerMemberId);
    if (!payer) return;

    // total ratio units among participants
    const totalRatio = e.participants.reduce((sum, mid) => {
      const m = getMember(mid);
      return sum + (m ? RATIOS[m.cat] : 0);
    }, 0);
    if (totalRatio === 0) return;

    // credit payer's family
    familyBal[payer.familyId] = (familyBal[payer.familyId] || 0) + e.amountJPY;

    // debit each participant's family proportionally
    e.participants.forEach(mid => {
      const m = getMember(mid);
      if (!m) return;
      const share = e.amountJPY * RATIOS[m.cat] / totalRatio;
      familyBal[m.familyId] = (familyBal[m.familyId] || 0) - share;
    });
  });
  return familyBal;
}

function settle(balances) {
  const pos = [], neg = [];
  Object.entries(balances).forEach(([id, bal]) => {
    const f = getFamily(parseInt(id));
    if (!f) return;
    if (bal > 1) pos.push({ id: parseInt(id), name: f.name, bal });
    else if (bal < -1) neg.push({ id: parseInt(id), name: f.name, bal: -bal });
  });
  pos.sort((a, b) => b.bal - a.bal);
  neg.sort((a, b) => b.bal - a.bal);
  const txs = [];
  let i = 0, j = 0;
  while (i < pos.length && j < neg.length) {
    const amt = Math.min(pos[i].bal, neg[j].bal);
    txs.push({ from: neg[j].name, to: pos[i].name, amount: amt });
    pos[i].bal -= amt; neg[j].bal -= amt;
    if (pos[i].bal < 1) i++;
    if (neg[j].bal < 1) j++;
  }
  return txs;
}

// ---------- render ----------
function render() {
  renderFamilies();
  renderPayerSelect();
  renderParticipants();
  renderExpenses();
  renderResult();
  saveData();
}

function renderFamilies() {
  const wrap = document.getElementById('families-wrap');
  if (!families.length) { wrap.innerHTML = '<div class="empty" style="padding:0.5rem 0">家族がまだ登録されていません</div>'; return; }
  wrap.innerHTML = families.map(f => `
    <div class="family-block">
      <div class="family-header">
        <span class="family-name">${f.name}</span>
        <button class="btn btn-sm btn-danger" onclick="removeFamily(${f.id})">削除</button>
      </div>
      <div class="family-members">
        ${f.members.length ? f.members.map(m => `
          <span class="member-tag ${m.cat}">
            <span class="cat-dot dot-${m.cat}"></span>
            ${m.name}<span style="opacity:0.6;font-size:11px">（${CAT_LABEL[m.cat]}）</span>
            <button onclick="removeMember(${m.id})">×</button>
          </span>`).join('') : '<span style="font-size:12px;color:var(--text-hint)">メンバーなし</span>'}
      </div>
    </div>`).join('');

  // family select for member add
  const fs = document.getElementById('member-family');
  const prev = fs.value;
  fs.innerHTML = families.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
  if (families.find(f => f.id == prev)) fs.value = prev;
}

function renderPayerSelect() {
  const ps = document.getElementById('exp-payer');
  const prev = parseInt(ps.value);
  const members = allMembers();
  ps.innerHTML = families.map(f =>
    f.members.length
      ? `<optgroup label="${f.name}">${f.members.map(m =>
          `<option value="${m.id}">${m.name}（${CAT_LABEL[m.cat]}）</option>`).join('')}</optgroup>`
      : ''
  ).join('');
  if (getMember(prev)) ps.value = prev;
}

function renderParticipants() {
  const pc = document.getElementById('participants-check');
  const prevSel = new Set([...pc.querySelectorAll('.check-chip.selected')].map(c => parseInt(c.dataset.mid)));
  const members = allMembers();
  if (!members.length) { pc.innerHTML = '<span style="font-size:13px;color:var(--text-hint)">先にメンバーを追加してください</span>'; return; }

  pc.innerHTML = families.map(f => {
    if (!f.members.length) return '';
    return `<span style="font-size:11px;color:var(--text-muted);display:block;margin:6px 0 2px;width:100%">${f.name}</span>` +
      f.members.map(m =>
        `<span class="check-chip ${(prevSel.has(m.id) || prevSel.size === 0) ? 'selected' : ''}" data-mid="${m.id}" onclick="this.classList.toggle('selected')">
          <span class="cat-dot dot-${m.cat}"></span>${m.name}
        </span>`).join('');
  }).join('');
}

function renderExpenses() {
  const el = document.getElementById('expenses-list');
  if (!expenses.length) { el.innerHTML = '<div class="empty">まだ支払いがありません</div>'; return; }
  el.innerHTML = expenses.map(e => {
    const payer = getMember(e.payerMemberId);
    const payerLabel = payer ? `${payer.familyName} ${payer.name}` : '不明';
    const participantLabels = e.participants.map(mid => {
      const m = getMember(mid);
      return m ? m.name : '?';
    }).join('、');
    return `
    <div class="expense-item">
      <div class="expense-top">
        <div>
          <div class="expense-desc">${e.desc}</div>
          <div class="expense-meta">${e.date ? e.date + '　' : ''}支払: ${payerLabel}　参加: ${participantLabels}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="expense-amount">${fmt(e.amountJPY)}</span>
          <button class="btn btn-sm btn-danger" onclick="removeExpense(${e.id})">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderResult() {
  const total = expenses.reduce((s, e) => s + e.amountJPY, 0);
  const totalMembers = allMembers().length;
  const totalRatioUnits = allMembers().reduce((s, m) => s + RATIOS[m.cat], 0);

  document.getElementById('summary-grid').innerHTML = `
    <div class="metric"><div class="metric-label">合計支出</div><div class="metric-value">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">家族数</div><div class="metric-value">${families.length}家族</div></div>
    <div class="metric"><div class="metric-label">人数</div><div class="metric-value">${totalMembers}人</div></div>`;

  const rl = document.getElementById('result-list');
  if (!expenses.length || !families.length) {
    rl.innerHTML = '<div class="empty">家族・メンバーと支払いを入力してください</div>'; return;
  }
  const balances = calcBalances();
  const txs = settle(balances);
  if (!txs.length) {
    rl.innerHTML = '<div class="empty" style="color:var(--success-text)">全員清算済みです！</div>'; return;
  }
  rl.innerHTML = txs.map(t => `
    <div class="settle-card pay">
      <div class="settle-label">
        <span class="name">${t.from}</span>
        <span class="settle-arrow">→</span>
        <span class="name">${t.to}</span>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">が支払う</div>
      </div>
      <div class="settle-pay-amount">${fmt(t.amount)}</div>
    </div>`).join('');
}

loadData().then(() => {
  setCurrency(displayCur);
});
</script>
</body>
</html>
